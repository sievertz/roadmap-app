name: Release

# Triggered by pushing a git tag like v0.1.1, v0.2.0, etc.
# Builds a signed macOS app and creates a draft GitHub Release
# with the .dmg, .app.tar.gz, and .sig files attached.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            **Installing for the first time? Run this once after dragging to /Applications:**

            ```
            xattr -dr com.apple.quarantine /Applications/Roadmap.app
            ```

            See the [README](https://github.com/sievertz/roadmap-app#first-launch-important) for why. Auto-updates from inside the app don't need this.

            ---

            ## What's new

            _Add release notes here before publishing._
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
